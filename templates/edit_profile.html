{% extends "base.html" %}
{% block title %}Редагування профілю{% endblock %}

{% block content %}

<h1>Редагування профілю</h1>
<div class="decor-line"></div>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <label class="mt-3">Новий нікнейм:</label>
    <input type="text" name="nickname" class="form-control" value="{{ current_user.nickname }}">

    <label class="mt-3">Новий пароль:</label>
    <input type="password" name="password" class="form-control">

    <button class="btn btn-custom mt-4">Зберегти зміни</button>

</form>

{% endblock %}
