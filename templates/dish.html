{% extends "base.html" %}
{% block title %}{{ dish.name }}{% endblock %}

{% block content %}

<div class="row">
    <div class="col-md-6">
        <img src="{{ url_for('static', filename='images/menu/' + dish.image) }}" alt="{{ dish.name }}" class="menu-img" style="height:300px;">
    </div>

    <div class="col-md-6">
        <h1>{{ dish.name }}</h1>
        <div class="decor-line"></div>

        <p>{{ dish.description }}</p>
        <p><strong>Вага:</strong> {{ dish.weight }} г</p>
        <p><strong>Калорійність:</strong> {{ dish.cal }} ккал</p>
        <p><strong>Ціна:</strong> {{ dish.price }} грн</p>

        <form method="POST" action="{{ url_for('add_to_cart', dish_id=dish.id) }}" class="d-inline">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="btn btn-custom">Додати в кошик</button>
        </form>
    </div>
</div>

{% endblock %}
