{% extends "base.html" %}
{% block title %}Адмін — Столи{% endblock %}

{% block content %}

<h1>Управління столами</h1>
<div class="decor-line"></div>

<a href="{{ url_for('admin_add_table') }}" class="btn btn-custom mb-3">Додати стіл</a>

<table class="table">
    <tr>
        <th>ID</th>
        <th>Місць</th>
        <th></th>
    </tr>

    {% for table in tables %}
    <tr>
        <td>{{ table.id }}</td>
        <td>{{ table.seats }}</td>
        <td>
            <a href="{{ url_for('admin_edit_table', table_id=table.id) }}" class="btn btn-custom btn-sm">Редагувати</a>
            <form method="POST" action="{{ url_for('admin_delete_table', table_id=table.id) }}" class="d-inline"
                onsubmit="return confirm('Видалити цей стіл?');">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button type="submit" class="btn btn-danger btn-sm ms-1">Видалити</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
